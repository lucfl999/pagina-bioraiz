    --bz-shadow-lg:  0 18px 42px rgba(30,51,32,0.12);

  img { max-width: 100%; display: block; }

  /* ───────── Animations / reveals ───────── */
  @keyframes bz-fade-up { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes bz-fade-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes bz-slide-down { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes bz-grow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  @keyframes bz-pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
  @keyframes bz-drift { 0% { transform: translate(0,0) rotate(0deg); } 50% { transform: translate(2%, -1%) rotate(0.5deg); } 100% { transform: translate(0,0) rotate(0deg); } }
  @keyframes bz-scroll-x { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  .reveal { opacity: 0; transform: translateY(28px); transition: opacity 800ms var(--bz-ease), transform 800ms var(--bz-ease); }
  .reveal.in { opacity: 1; transform: translateY(0); }
  .reveal-delay-1 { transition-delay: 80ms; }
  .reveal-delay-2 { transition-delay: 160ms; }
  .reveal-delay-3 { transition-delay: 240ms; }
  .reveal-delay-4 { transition-delay: 320ms; }
  .reveal-delay-5 { transition-delay: 400ms; }

  /* ───────── Page transitions ───────── */
  .page-enter { animation: bz-fade-up 600ms var(--bz-ease) both; }

  /* ───────── Scrollbar (subtle) ───────── */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(42, 61, 36, 0.18); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(42, 61, 36, 0.32); }

  .container { width: 100%; max-width: 1280px; margin: 0 auto; padding: 0 32px; }
  .container-narrow { width: 100%; max-width: 920px; margin: 0 auto; padding: 0 32px; }

  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; border-radius: var(--bz-radius-pill); font-size: 14px; font-weight: 500; letter-spacing: 0.02em; transition: transform 250ms var(--bz-spring), background 250ms var(--bz-ease), color 250ms var(--bz-ease), box-shadow 250ms var(--bz-ease); white-space: nowrap; }

  .btn-ghost:hover { color: var(--bz-tierra-rojo); }
  .btn-ghost::after { content: '→'; display: inline-block; margin-left: 6px; transition: transform 250ms var(--bz-ease); }

  .btn-on-dark { background: var(--bz-ocre-calido); color: var(--bz-verde-profundo); }
  .btn-on-dark:hover { background: var(--bz-beige-hueso); transform: translateY(-2px); }

  .tag { display: inline-block; padding: 5px 12px; border-radius: var(--bz-radius-pill); font-size: 11px; font-weight: 500; letter-spacing: 0.04em; background: var(--bz-verde-pasto); color: var(--bz-verde-bosque); }

  .tag-on-dark { background: rgba(157, 201, 159, 0.18); color: var(--bz-verde-claro); }

  /* ───────── Display type ───────── */
  .display { font-family: var(--bz-font-display); font-weight: 400; line-height: 1.05; letter-spacing: -0.01em; }
  .display em { font-style: italic; color: var(--bz-tierra-rojo); }
  .eyebrow { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.18em; color: var(--bz-verde-musgo); font-family: var(--bz-font-mono); }
  .eyebrow-tierra { color: var(--bz-tierra-rojo); }

  /* ───────── Placeholder (striped SVG) ───────── */
  .ph { position: relative; background-color: var(--bz-beige-base); background-image: repeating-linear-gradient(135deg, rgba(42, 61, 36, 0.07) 0 1px, transparent 1px 14px); overflow: hidden; display: flex; align-items: center; justify-content: center; }

</style>

// ── Scroll Reveal Hook ──────────────────────────────────────────
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll(".reveal:not(.in)");
    if (!els.length) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add("in");
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.12, rootMargin: "0px 0px -60px 0px" });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  });
}

// ── Animated Counter ────────────────────────────────────────────
function Counter({ to, suffix = "", duration = 1400 }) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  const started = useRef(false);
  useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting && !started.current) {
        started.current = true;
        const start = performance.now();
        const tick = (now) => {
          const t = Math.min(1, (now - start) / duration);
          const eased = 1 - Math.pow(1 - t, 3);
          setVal(Math.round(to * eased));
          if (t < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
        io.disconnect();
      }
    }, { threshold: 0.5 });
    io.observe(ref.current);
    return () => io.disconnect();
  }, [to, duration]);
  return <span ref={ref}>{val}{suffix}</span>;
}

function ValorBlock({ valor, index }) {

function ValorIcon({ kind }) {
  const c = "var(--bz-verde-profundo)";

          <circle cx="22" cy="14" r="4" stroke={a} strokeWidth="1.5" fill="none" />

    case "círculo":
      return (
        <svg width={size} height={size} viewBox="0 0 44 44" fill="none">
          <path d="M36 22 A 14 14 0 1 1 22 8" stroke={c} strokeWidth="2" strokeLinecap="round" fill="none" />
          <path d="M22 8 L30 8 L30 16" stroke={a} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
        </svg>
      );
    case "ola":
      return (
        <svg width={size} height={size} viewBox="0 0 44 44" fill="none">
          <path d="M4 18 Q 11 12, 18 18 T 32 18 T 40 18" stroke={c} strokeWidth="2" strokeLinecap="round" fill="none" />
          <path d="M4 28 Q 11 22, 18 28 T 32 28 T 40 28" stroke={a} strokeWidth="2" strokeLinecap="round" fill="none" opacity="0.7" />
        </svg>
      );
    case "trama":
      return (
        <svg width={size} height={size} viewBox="0 0 44 44" fill="none">
          <circle cx="14" cy="14" r="3" fill={c} />
          <circle cx="30" cy="14" r="3" fill={c} />
          <circle cx="22" cy="30" r="3" fill={a} />
          <path d="M14 14 L30 14 L22 30 Z" stroke={c} strokeWidth="1.5" fill="none" />
        </svg>
      );
    case "brote":
      return (
        <svg width={size} height={size} viewBox="0 0 44 44" fill="none">
          <path d="M22 38 L22 18" stroke={c} strokeWidth="2" strokeLinecap="round" />
          <path d="M22 22 C 14 22, 12 16, 12 12 C 18 13, 22 16, 22 22 Z" fill={c} />
          <path d="M22 18 C 30 18, 32 14, 32 10 C 26 11, 22 12, 22 18 Z" fill={a} />
        </svg>
      );
    default: return null;
  }
}

              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>

  <script type="text/babel">
// ─── BIORAIZ — Programa ────────────────────────────────────────

function PagePrograma({ setPage }) {
  useReveal();
  const [activeDia, setActiveDia] = useState("sabado");
  const [favorites, setFavorites] = useState(() => new Set());
  const [typeFilter, setTypeFilter] = useState("Todos");

  const acts = ACTIVIDADES[activeDia];

  // Get unique types for current day
  const types = ["Todos", ...new Set(acts.map(a => a.tipo))];

  const filteredActs = typeFilter === "Todos" ? acts : acts.filter(a => a.tipo === typeFilter);

  const toggleFav = (id) => {
    setFavorites(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  };

  return (
    <div className="page-enter">
      <SubPageHeader
        eyebrow="Programa · 3 días"
        title={<>Programa.</>}
        sub="Charlas, talleres, música, espacios para chicos y una cocina abierta. Marcá tus favoritos con la estrellita — los guardamos en tu navegador."
      />

      {/* Day tabs */}
      <section style={{ padding: "48px 0 0", background: "var(--bz-fondo-base)" }}>
        <div className="container">
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8, background: "var(--bz-beige-base)", padding: 6, borderRadius: "var(--bz-radius-lg)", maxWidth: 720, margin: "0 auto 56px" }}>
            {DIAS.map(d => (
              <button
                key={d.id}
                onClick={() => setActiveDia(d.id)}
                style={{
                  padding: "16px 20px",
                  borderRadius: "var(--bz-radius-md)",
                  background: activeDia === d.id ? "var(--bz-verde-profundo)" : "transparent",
                  color: activeDia === d.id ? "var(--bz-beige-hueso)" : "var(--bz-texto-secundario)",
                  transition: "all 300ms var(--bz-ease)",
                  textAlign: "center",
                }}
              >
                <div className="display" style={{ fontSize: 32, lineHeight: 1, marginBottom: 4 }}>{d.num}</div>
                <div style={{ fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", fontFamily: "var(--bz-font-mono)", opacity: activeDia === d.id ? 0.8 : 1 }}>{d.label}</div>
                <div style={{ fontSize: 11, opacity: activeDia === d.id ? 0.6 : 0.5, marginTop: 4, fontStyle: "italic", fontFamily: "var(--bz-font-display)" }}>{d.subtitulo}</div>
              </button>
            ))}
          </div>
        </div>
      </section>

      {/* Type filter pills */}
      <section style={{ padding: "0 0 24px", background: "var(--bz-fondo-base)" }}>
        <div className="container">
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center" }}>
            {types.map(t => (
              <button
                key={t}
                onClick={() => setTypeFilter(t)}
                style={{
                  padding: "7px 14px",
                  borderRadius: "var(--bz-radius-pill)",
                  fontSize: 12,
                  fontWeight: 500,
                  background: typeFilter === t ? "var(--bz-tierra-rojo)" : "var(--bz-beige-base)",
                  color: typeFilter === t ? "var(--bz-beige-hueso)" : "var(--bz-texto-secundario)",
                  transition: "all 200ms var(--bz-ease)",
                }}
              >
                {t}
              </button>
            ))}
          </div>
        </div>
      </section>

      {/* Timeline */}
      <section key={activeDia + typeFilter} style={{ padding: "32px 0 80px", background: "var(--bz-fondo-base)", animation: "bz-fade-in 400ms var(--bz-ease) both" }}>
        <div className="container" style={{ maxWidth: 920 }}>
          {filteredActs.length === 0 ? (
            <div style={{ textAlign: "center", padding: 80, color: "var(--bz-texto-secundario)" }}>
              <div style={{ fontSize: 40, marginBottom: 12 }}>🍃</div>
              <p>Nada de este tipo en este día. Probá otro.</p>
            </div>
          ) : (
            <div style={{ position: "relative" }}>
              {/* Vertical timeline line */}
              <div style={{ position: "absolute", left: 80, top: 12, bottom: 12, width: 1, background: "var(--bz-borde-suave)" }} className="bz-timeline-line" />

              {filteredActs.map((act, i) => {
                const id = `${activeDia}-${act.hora}-${act.title}`;
                const isFav = favorites.has(id);
                return (
                  <article key={id} className="reveal" style={{
                    display: "grid",
                    gridTemplateColumns: "80px 1fr auto",
                    gap: 32,
                    padding: "20px 0",
                    alignItems: "start",
                    position: "relative",
                    transitionDelay: `${i * 50}ms`,
                  }} className="bz-act-row">
                    {/* Hora */}
                    <div style={{ paddingTop: 4 }}>
                      <div className="display" style={{ fontSize: 24, color: "var(--bz-tierra-rojo)", lineHeight: 1, letterSpacing: "-0.02em" }}>{act.hora}</div>
                    </div>

                    {/* Dot on timeline */}
                    <div style={{ position: "absolute", left: 76, top: 24, width: 9, height: 9, borderRadius: "50%", background: act.destacado ? "var(--bz-ocre-calido)" : "var(--bz-verde-musgo)", border: "2px solid var(--bz-fondo-base)" }} className="bz-timeline-dot" />

                    {/* Content card */}
                    <div style={{
                      background: act.destacado ? "var(--bz-beige-hueso)" : "transparent",
                      border: act.destacado ? "0.5px solid var(--bz-ocre-calido)" : "0.5px solid var(--bz-borde-ligero)",
                      borderRadius: "var(--bz-radius-md)",
                      padding: "18px 22px",
                      transition: "transform 250ms var(--bz-ease)",
                      cursor: "default",
                    }}
                    onMouseEnter={e => e.currentTarget.style.transform = "translateX(4px)"}
                    onMouseLeave={e => e.currentTarget.style.transform = "translateX(0)"}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6, flexWrap: "wrap" }}>
                        <span className={`tag ${act.tipo === "Charla" ? "" : act.tipo === "Música" ? "tag-tierra" : "tag-ocre"}`}>{act.tipo}</span>
                        {act.destacado && <span style={{ fontSize: 10, color: "var(--bz-ocre-tostado)", letterSpacing: "0.14em", textTransform: "uppercase", fontFamily: "var(--bz-font-mono)" }}>★ Destacada</span>}
                      </div>
                      <h3 style={{ fontFamily: "var(--bz-font-display)", fontSize: 22, color: "var(--bz-texto-primario)", marginBottom: 8, lineHeight: 1.25 }}>{act.title}</h3>
                      <div style={{ display: "flex", gap: 16, flexWrap: "wrap", fontSize: 13, color: "var(--bz-texto-secundario)" }}>
                        <span>📍 {act.lugar}</span>
                        <span>· {act.speaker}</span>
                      </div>
                    </div>

                    {/* Favorite */}
                    <button
                      onClick={() => toggleFav(id)}
                      aria-label="Marcar como favorito"
                      style={{

// ── Ticket card ──
function TicketCard({ ticket, index }) {
  const colors = {
    ocre:    { bg: "var(--bz-ocre-calido)",    fg: "var(--bz-verde-profundo)", accent: "var(--bz-verde-profundo)", border: "var(--bz-ocre-tostado)" },
    verde:   { bg: "var(--bz-verde-profundo)", fg: "var(--bz-beige-hueso)",    accent: "var(--bz-ocre-calido)",    border: "var(--bz-verde-profundo)" },
    tierra:  { bg: "var(--bz-beige-hueso)",    fg: "var(--bz-texto-primario)", accent: "var(--bz-tierra-rojo)",    border: "var(--bz-borde-suave)" },
  };
  const c = colors[ticket.color];
  const featured = ticket.destacado;

  return (
    <article className="reveal" style={{
      background: c.bg,
      color: c.fg,
      borderRadius: "var(--bz-radius-xl)",
      padding: "40px 36px",
      border: `1px solid ${c.border}`,
      boxShadow: featured ? "var(--bz-shadow-lg)" : "none",
      transform: featured ? "translateY(-12px)" : "none",
      transition: "transform 300ms var(--bz-ease), box-shadow 300ms var(--bz-ease)",
      transitionDelay: `${index * 100}ms`,
      position: "relative",
      display: "flex", flexDirection: "column",
    }}
    onMouseEnter={e => { e.currentTarget.style.transform = featured ? "translateY(-16px)" : "translateY(-4px)"; }}
    onMouseLeave={e => { e.currentTarget.style.transform = featured ? "translateY(-12px)" : "translateY(0)"; }}
    >
      {featured && (
        <div style={{
          position: "absolute", top: -14, left: "50%", transform: "translateX(-50%)",
          background: "var(--bz-ocre-calido)", color: "var(--bz-verde-profundo)",
          padding: "5px 14px", borderRadius: "var(--bz-radius-pill)",
          fontSize: 10, fontWeight: 600, letterSpacing: "0.16em", textTransform: "uppercase", fontFamily: "var(--bz-font-mono)",
        }}>★ Más elegida</div>
      )}

      <div style={{ fontSize: 11, letterSpacing: "0.16em", textTransform: "uppercase", fontFamily: "var(--bz-font-mono)", opacity: 0.7, marginBottom: 14 }}>{ticket.badge}</div>
      <h3 style={{ fontFamily: "var(--bz-font-display)", fontSize: 36, marginBottom: 16, lineHeight: 1 }}>{ticket.name}</h3>

      <div style={{ marginBottom: 28 }}>
        <div className="display" style={{ fontSize: 48, color: c.accent, lineHeight: 1 }}>{ticket.precio}</div>
        {ticket.precioOrig && (
          <div style={{ fontSize: 13, opacity: 0.6, textDecoration: "line-through", marginTop: 6 }}>{ticket.precioOrig}</div>
        )}
      </div>

      <ul style={{ listStyle: "none", marginBottom: 32, flex: 1 }}>
        {ticket.incluye.map((item, j) => (
          <li key={j} style={{ display: "flex", gap: 10, padding: "8px 0", fontSize: 14, lineHeight: 1.5, opacity: 0.9, borderTop: j > 0 ? `0.5px solid ${ticket.color === "verde" ? "rgba(250,246,237,0.15)" : "var(--bz-borde-ligero)"}` : "none" }}>
            <span style={{ color: c.accent, flexShrink: 0 }}>✓</span>
            {item}
          </li>
        ))}
      </ul>

      <button style={{
        padding: "14px 24px",
        borderRadius: "var(--bz-radius-pill)",
        background: ticket.color === "verde" ? "var(--bz-ocre-calido)" : "var(--bz-verde-profundo)",
        color: ticket.color === "verde" ? "var(--bz-verde-profundo)" : "var(--bz-beige-hueso)",
        fontSize: 14, fontWeight: 500,
        transition: "transform 200ms var(--bz-spring)",
      }}
      onMouseEnter={e => e.currentTarget.style.transform = "scale(1.02)"}
      onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"}>
        Comprar {ticket.name}
      </button>
    </article>
  );
}

// ── FAQ Item ──
function FaqItem({ item, open, onClick, index }) {

          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M12 5v14M5 12h14"/></svg>
        </span>
      </button>
      <div style={{
        maxHeight: open ? 200 : 0,
        overflow: "hidden",
        transition: "max-height 350ms var(--bz-ease), opacity 250ms var(--bz-ease)",
        opacity: open ? 1 : 0,
      }}>
        <p style={{ paddingBottom: 28, paddingRight: 56, fontSize: 15, color: "var(--bz-texto-secundario)", lineHeight: 1.7 }}>{item.a}</p>
      </div>
    </div>
  );
}

  <!-- ===== src/page-participa.jsx ===== -->
  <script type="text/babel">
// ─── BIORAIZ — Participá del Festival ─────────────────────────────
// Renderer de los formularios. Los SCHEMAS y los TABS viven en
// participa-forms.jsx (window.FORM_SCHEMAS / window.PARTICIPA_TABS).
//
// ── EMAILJS (envío desde el frontend, sin backend) ───────────────
// 1. Creá cuenta en https://emailjs.com y conectá el Gmail del evento
//    (Email Services → te da un SERVICE_ID).
// 2. Creá una template por cada tipo de formulario (Email Templates →
//    cada una te da un TEMPLATE_ID). En el cuerpo usá las variables
//    {{nombre_del_campo}} que coinciden con los `name` de los inputs.
// 3. Copiá tu Public Key (Account → API Keys) y pegá todo en EMAILJS_CONFIG.
// 4. Pegá el templateId de cada tab en PARTICIPA_TABS (participa-forms.jsx).
// El SDK de EmailJS se carga en BIORAIZ.html (cdn.jsdelivr → @emailjs/browser).

// ── Credenciales de EmailJS (REEMPLAZAR por las tuyas) ───────────
const EMAILJS_CONFIG = {
  publicKey: "REEMPLAZAR_PUBLIC_KEY",   // Account → API Keys → Public Key
  serviceId: "REEMPLAZAR_SERVICE_ID",   // Email Services → Service ID (Gmail)
};

if (typeof window !== "undefined" && window.emailjs && !window.__bzEmailjsInit) {
  window.emailjs.init({ publicKey: EMAILJS_CONFIG.publicKey });
  window.__bzEmailjsInit = true;
}

// ── Paleta exacta de la sección (specs del usuario) ──────────────
const PZ = {
  fondo:   "#1E3320", // fondo de la sección
  campo:   "#2C2418", // fondo de los campos
  borde:   "#7A9E5A", // borde de campos + tab activo + botón (color hoja)
  texto:   "#F5F0E8", // texto de los campos
  label:   "#C8B87A", // labels (DM Mono)
};

// ── Helper: **negrita** dentro de un texto plano ─────────────────
function richText(text) {
  if (!text) return null;
  return text.split(/(\*\*[^*]+\*\*)/g).map((part, i) => {
    if (part.startsWith("**") && part.endsWith("**")) {
      return <strong key={i} style={{ color: PZ.label, fontWeight: 600 }}>{part.slice(2, -2)}</strong>;
    }
    return <React.Fragment key={i}>{part}</React.Fragment>;
  });
}

// ── Estilos base reutilizables ───────────────────────────────────
const pzLabel = {
  display: "block",
  fontFamily: "var(--bz-font-mono)",
  fontSize: 12,
  fontWeight: 500,
  letterSpacing: "0.06em",
  textTransform: "uppercase",
  color: PZ.label,
  marginBottom: 9,
  lineHeight: 1.45,
};

const pzHint = {
  fontSize: 12.5,
  color: "rgba(245,240,232,0.5)",
  lineHeight: 1.5,
  marginTop: 8,
};

// ── Grupo de opciones (radio / checkbox) como tarjetas ───────────
function OptionGroup({ field }) {
  const multi = field.type === "checkbox";
  const opts = field.options.map(o => (typeof o === "string" ? { t: o } : o));
  const [val, setVal] = useState(multi ? [] : "");

  const isOn = (t) => (multi ? val.includes(t) : val === t);
  const toggle = (t) => {
    if (multi) setVal(v => (v.includes(t) ? v.filter(x => x !== t) : [...v, t]));
    else setVal(t);
  };

  return (
    <div style={{ display: "grid", gap: 9 }}>
      {opts.map(o => {
        const on = isOn(o.t);
        return (
          <label key={o.t} style={{
            display: "flex",
            alignItems: "flex-start",
            gap: 13,
            padding: "13px 16px",
            borderRadius: "var(--bz-radius-md)",
            background: on ? "rgba(122,158,90,0.12)" : PZ.campo,
            border: `1px solid ${on ? PZ.borde : "rgba(122,158,90,0.28)"}`,
            cursor: "pointer",
            transition: "background 160ms var(--bz-ease), border-color 160ms var(--bz-ease)",
          }}>
            <input
              type={multi ? "checkbox" : "radio"}
              name={field.name}
              value={o.t}
              checked={on}
              onChange={() => toggle(o.t)}
              required={field.required && !multi}
              style={{ position: "absolute", opacity: 0, width: 0, height: 0 }}
            />
            <span aria-hidden="true" style={{
              flexShrink: 0,
              width: 19, height: 19,
              marginTop: 1,
              borderRadius: multi ? 5 : "50%",
              border: `2px solid ${on ? PZ.borde : "rgba(122,158,90,0.5)"}`,
              background: on ? PZ.borde : "transparent",
              display: "flex", alignItems: "center", justifyContent: "center",
              transition: "all 160ms var(--bz-ease)",
            }}>
              {on && (multi
                ? <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={PZ.fondo} strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5" /></svg>
                : <span style={{ width: 7, height: 7, borderRadius: "50%", background: PZ.fondo }} />)}
            </span>
            <span style={{ flex: 1 }}>
              <span style={{ display: "block", fontSize: 14.5, color: PZ.texto, lineHeight: 1.45 }}>{o.t}</span>
              {o.s && <span style={{ display: "block", fontSize: 12.5, color: "rgba(245,240,232,0.52)", lineHeight: 1.45, marginTop: 3 }}>{o.s}</span>}
            </span>
          </label>
        );
      })}
    </div>
  );
}

// ── Campo de formulario ──────────────────────────────────────────
function ParticipaField({ field }) {
  const [focus, setFocus] = useState(false);

  const baseStyle = {
    width: "100%",
    background: PZ.campo,
    border: `1px solid ${focus ? PZ.borde : "rgba(122,158,90,0.45)"}`,
    borderRadius: "var(--bz-radius-md)",
    padding: "13px 16px",
    fontSize: 15,
    fontFamily: "var(--bz-font-body)",
    color: PZ.texto,
    outline: "none",
    transition: "border-color 200ms var(--bz-ease), box-shadow 200ms var(--bz-ease)",
    boxShadow: focus ? "0 0 0 3px rgba(122,158,90,0.16)" : "none",
  };

  const common = {
    id: `pz-${field.name}`,
    name: field.name,
    required: field.required,
    onFocus: () => setFocus(true),
    onBlur: () => setFocus(false),
    placeholder: field.placeholder || "",
  };

  let control;
  if (field.type === "radio" || field.type === "checkbox") {
    control = <OptionGroup field={field} />;
  } else if (field.type === "textarea") {
    control = <textarea {...common} rows={field.rows || 4} style={{ ...baseStyle, resize: "vertical", minHeight: (field.rows || 4) * 26, lineHeight: 1.55 }} />;
  } else if (field.type === "select") {
    control = (
      <div style={{ position: "relative" }}>
        <select {...common} defaultValue="" style={{ ...baseStyle, appearance: "none", WebkitAppearance: "none", paddingRight: 40, cursor: "pointer" }}>
          <option value="" disabled hidden>Seleccioná…</option>
          {field.options.map(o => <option key={o} value={o} style={{ background: PZ.campo, color: PZ.texto }}>{o}</option>)}
        </select>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={PZ.borde} strokeWidth="2" style={{ position: "absolute", right: 16, top: "50%", transform: "translateY(-50%)", pointerEvents: "none" }}>
          <path d="M6 9l6 6 6-6" />
        </svg>
      </div>
    );
  } else {
    control = <input {...common} type={field.type} style={baseStyle} />;
  }

  return (
    <div>
      <label style={pzLabel} htmlFor={`pz-${field.name}`}>
        {field.label}{field.required && <span style={{ color: PZ.borde, marginLeft: 4 }}>*</span>}
      </label>
      {control}
      {field.hint && <p style={pzHint}>{field.hint}</p>}
    </div>
  );
}

// ── Una sección del formulario ───────────────────────────────────
function ParticipaSection({ section, last }) {
  return (
    <div style={{ paddingBottom: last ? 0 : 44, marginBottom: last ? 0 : 44, borderBottom: last ? "none" : "1px solid rgba(122,158,90,0.16)" }}>
      <div style={{ marginBottom: 26 }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 12, marginBottom: 8 }}>
          <span style={{ fontFamily: "var(--bz-font-mono)", fontSize: 13, fontWeight: 600, color: PZ.borde, letterSpacing: "0.05em" }}>{section.num}</span>
          <span style={{ fontFamily: "var(--bz-font-mono)", fontSize: 11.5, fontWeight: 500, letterSpacing: "0.14em", textTransform: "uppercase", color: "rgba(245,240,232,0.42)" }}>{section.label}</span>
        </div>
        {section.title && <h3 className="display" style={{ fontSize: "clamp(22px, 2.6vw, 28px)", color: PZ.texto, lineHeight: 1.15, marginBottom: section.desc ? 8 : 0 }}>{section.title}</h3>}
        {section.desc && <p style={{ fontSize: 14.5, color: "rgba(245,240,232,0.6)", lineHeight: 1.55, maxWidth: 620 }}>{section.desc}</p>}
      </div>

      <div style={{ display: "grid", gap: 22 }}>
        {section.items.map((item, i) => {
          if (item.row) {
            return (
              <div key={i} className="pz-row" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "22px 24px" }}>
                {item.row.map(f => <ParticipaField key={f.name} field={f} />)}
              </div>
            );
          }
          return <ParticipaField key={item.name} field={item} />;
        })}
      </div>
    </div>
  );
}

// ── Formulario completo de un tab ────────────────────────────────
function ParticipaForm({ tab }) {
  const schema = FORM_SCHEMAS[tab.id];
  const [status, setStatus] = useState("idle"); // idle | sending | sent | error

  const handleSubmit = async (e) => {
    e.preventDefault();
    const form = e.currentTarget;
    if (!window.emailjs) { setStatus("error"); return; }

    setStatus("sending");
    try {
      await window.emailjs.sendForm(
        EMAILJS_CONFIG.serviceId,
        tab.templateId,
        form,
        { publicKey: EMAILJS_CONFIG.publicKey }
      );
      setStatus("sent");
      form.reset();
    } catch (err) {
      console.error("EmailJS error:", err);
      setStatus("error");
    }
  };

  // ── Confirmación (fondo #1E3320 · hoja · Playfair Display) ──
  if (status === "sent") {
    return (
      <div style={{ textAlign: "center", padding: "80px 24px", animation: "bz-fade-up 500ms var(--bz-ease) both" }}>
        <div style={{ display: "flex", justifyContent: "center", marginBottom: 20 }}>
          <LeafShape size={80} color={PZ.borde} rotate={-8} />
        </div>
        <h3 className="display" style={{ fontSize: "clamp(28px, 4vw, 40px)", color: PZ.texto, lineHeight: 1.25, maxWidth: 560, margin: "0 auto" }}>
          ¡Recibimos tu solicitud! Te contactaremos en los próximos días.
        </h3>
        <button onClick={() => setStatus("idle")} style={{
          marginTop: 34,
          padding: "11px 22px", borderRadius: "var(--bz-radius-pill)",
          border: "1px solid rgba(122,158,90,0.5)", background: "transparent",
          color: PZ.texto, fontSize: 13, fontWeight: 500, cursor: "pointer",
        }}>Enviar otra solicitud</button>
      </div>
    );
  }

  const sending = status === "sending";

  return (
    <form onSubmit={handleSubmit}>
      {/* Meta para la template de EmailJS */}
      <input type="hidden" name="_subject" value={tab.subject} />
      <input type="hidden" name="tipo_participacion" value={tab.label} />

      {/* Nota de la convocatoria */}
      {schema.note && (
        <div style={{
          display: "flex", alignItems: "flex-start", gap: 14,
          padding: "18px 22px", marginBottom: 44,
          background: "rgba(122,158,90,0.08)",
          borderRadius: "var(--bz-radius-md)",
          border: "1px solid rgba(122,158,90,0.22)",
        }}>
          <div style={{ flexShrink: 0, marginTop: 1 }}><LeafShape size={26} color={PZ.borde} rotate={-6} /></div>
          <p style={{ fontSize: 14, color: "rgba(245,240,232,0.78)", lineHeight: 1.6 }}>{richText(schema.note)}</p>
        </div>
      )}

      <fieldset disabled={sending} style={{ border: "none", margin: 0, padding: 0, minInlineSize: "auto" }}>
        {schema.sections.map((s, i) => (
          <ParticipaSection key={i} section={s} last={i === schema.sections.length - 1} />
        ))}
      </fieldset>

      {/* Nota de cierre */}
      {schema.submitNote && (
        <p style={{ marginTop: 44, padding: "16px 20px", background: "rgba(245,240,232,0.04)", borderRadius: "var(--bz-radius-md)", fontSize: 13.5, color: "rgba(245,240,232,0.62)", lineHeight: 1.6 }}>
          {richText(schema.submitNote)}
        </p>
      )}

      <div style={{ marginTop: 28, display: "flex", alignItems: "center", gap: 18, flexWrap: "wrap" }}>
        <button type="submit" className="pz-submit" disabled={sending} style={{
          display: "inline-flex", alignItems: "center", gap: 11,
          padding: "15px 32px",
          borderRadius: "var(--bz-radius-pill)",
          background: PZ.borde,
          color: PZ.fondo,
          fontSize: 14, fontWeight: 600,
          letterSpacing: "0.08em",
          fontFamily: "var(--bz-font-mono)",
          textTransform: "uppercase",
          opacity: sending ? 0.85 : 1,
          cursor: sending ? "wait" : "pointer",
          transition: "transform 200ms var(--bz-spring), filter 200ms var(--bz-ease)",
        }}
        onMouseEnter={e => { if (!sending) { e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.filter = "brightness(1.08)"; } }}
        onMouseLeave={e => { e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.filter = "brightness(1)"; }}>
          {sending && <span className="pz-spinner" aria-hidden="true" />}
          {sending ? "Enviando…" : "Enviar solicitud"}
        </button>
        <span style={{ fontSize: 12, color: "rgba(245,240,232,0.5)", fontFamily: "var(--bz-font-mono)" }}>
          * Campos obligatorios
        </span>
      </div>

      {status === "error" && (
        <div role="alert" style={{
          marginTop: 22, display: "flex", alignItems: "flex-start", gap: 12,
          padding: "14px 18px",
          borderRadius: "var(--bz-radius-md)",
          background: "rgba(168,58,46,0.14)",
          border: "1px solid #C0392B",
          animation: "bz-fade-up 350ms var(--bz-ease) both",
        }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#E5736A" strokeWidth="2.2" strokeLinecap="round" style={{ flexShrink: 0, marginTop: 1 }}>
            <circle cx="12" cy="12" r="10" /><path d="M12 8v5M12 16.5v.5" />
          </svg>
          <div style={{ flex: 1 }}>
            <p style={{ fontSize: 13.5, color: "#E5736A", fontFamily: "var(--bz-font-mono)", lineHeight: 1.5 }}>
              No pudimos enviar tu solicitud. Revisá tu conexión e intentá de nuevo, o escribinos a hola@bioraiz.ar.
            </p>
            <button type="submit" style={{
              marginTop: 10, padding: "8px 18px",
              borderRadius: "var(--bz-radius-pill)",
              border: "1px solid #C0392B", background: "transparent",
              color: "#E5736A", fontSize: 12, fontWeight: 600,
              letterSpacing: "0.06em", textTransform: "uppercase",
              fontFamily: "var(--bz-font-mono)", cursor: "pointer",
            }}>Reintentar</button>
          </div>
        </div>
      )}
    </form>
  );
}

// ── Página / Sección ─────────────────────────────────────────────

  <script type="text/babel">
// ─── BIORAIZ — App entry / Router ───────────────────────────────

function App() {
  const [page, setPage] = useState(() => {
    const hash = window.location.hash.replace("#", "");
    return hash && ["home", "feria", "expositores", "programa", "entradas", "participa", "prensa"].includes(hash) ? hash : "home";
  });

  // Sync to hash
  useEffect(() => {
    window.location.hash = page;
    window.scrollTo({ top: 0, behavior: "auto" });
  }, [page]);

  // Handle back/forward
  useEffect(() => {
    const onHash = () => {
      const h = window.location.hash.replace("#", "");
      if (h && h !== page) setPage(h);
    };
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, [page]);

  const transparentHeader = page === "home";

  let Page;
  switch (page) {
    case "feria":        Page = PageFeria;       break;
    case "expositores":  Page = PageExpositores; break;
    case "programa":     Page = PagePrograma;    break;
    case "entradas":     Page = PageEntradas;    break;
    case "participa":    Page = PageParticipa;   break;
    case "prensa":       Page = PagePrensa;      break;
    default:             Page = PageHome;
  }

  return (
    <React.Fragment>
      <Header page={page} setPage={setPage} transparent={transparentHeader} />
      <main key={page}>
        <Page setPage={setPage} />
      </main>
      <Footer setPage={setPage} />
    </React.Fragment>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

  </script>
